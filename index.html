<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CyberHub — Cybersecurity Learning Platform</title>
    <meta name="description" content="Professional cybersecurity knowledge platform — CVE intel, attack visualization, frameworks, cheatsheets." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <!-- GitHub Pages SPA redirect fix -->
    <script>
      (function () {
        var redirect = sessionStorage.getItem('redirect');
        if (redirect) {
          sessionStorage.removeItem('redirect');
          var url = new URL(redirect);
          if (url.pathname !== window.location.pathname) {
            window.history.replaceState(null, null, url.pathname + url.search + url.hash);
          }
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
